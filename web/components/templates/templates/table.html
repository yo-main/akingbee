<div class="ak-table-wrap">
  <table class="table {{ if .IsFullWidth }}is-fullwidth{{ end }}">

    {{ if .ColumnSizes }}
    <colgroup>
      {{ range .ColumnSizes }}
      <col span="{{ .Span }}" style="{{ .Style }}">
      {{ end }}
    </colgroup>
    {{ end }}

    <thead>
      <tr>
        {{ range .Headers }}
        <th>{{ .Label }}</th>
        {{ end }}
      </tr>
    </thead>

    <tbody {{ if .ID }}id="{{ .ID }}"{{ end }}>
      {{ range .Rows }}
      {{ template "table_row.html" . }}
      {{ end }}
    </tbody>

  </table>
</div>
