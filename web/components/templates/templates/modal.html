<!-- Modal (hidden until triggered) -->
<div class="modal" hx-on:htmx:after-request="this.classList.remove('is-active')">

  <!-- Close on Escape -->
  <div hx-trigger="keyup from:body" hx-disinherit="*" hx-get="data:text/html," hx-swap="none"
    hx-on:htmx:before-request="if (event.detail.requestConfig.triggeringEvent.key !== 'Escape') {event.preventDefault()}">
  </div>

  <!-- Backdrop closes modal -->
  <div class="modal-background" hx-on:click="this.closest('.modal').classList.remove('is-active')"></div>

  <div class="modal-card">

    <header class="modal-card-head">
      <p class="modal-card-title">{{ .Title }}</p>
      <button class="modal-close is-large" aria-label="close"
        onclick="this.closest('.modal').classList.remove('is-active')">
      </button>
      <!-- Custom close button styled by our CSS -->
      <button
        onclick="this.closest('.modal').classList.remove('is-active')"
        style="background:none;border:none;cursor:pointer;font-size:22px;line-height:1;color:var(--text-light);margin-left:auto;padding:0;">
        ×
      </button>
    </header>

    <section class="modal-card-body">
      {{ template "form.html" .Form }}
    </section>

    <footer class="modal-card-foot">
      <button class="button"
        onclick="this.closest('.modal').classList.remove('is-active')"
        type="button">
        Annuler
      </button>
      {{ template "button.html" .SubmitFormButton }}
    </footer>

  </div>
</div>

<!-- Trigger: clicking this opens the modal -->
<div hx-on:click="this.previousSibling.previousSibling.classList.add('is-active')">
  {{ template "button.html" .ShowModalButton }}
</div>
