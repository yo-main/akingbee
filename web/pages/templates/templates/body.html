<body>
  <!-- Network error notification handler -->
  <div
    hx-on:htmx:send-error="htmx.swap(document.querySelector('#notificationBox'), `<div class='notification is-danger' hx-trigger='load delay:5s' hx-target='this' hx-swap='delete' hx-get='data:text/html,'><button class='delete' hx-get='data:text/html,'></button><div>Erreur réseau</div></div>`, {swapStyle: 'afterbegin'})">

    <!-- Navbar swap target -->
    <div hx-disinherit="*" hx-trigger="menuEvent from:body" hx-get="data:text/html," hx-swap="none"
      hx-on:htmx:after-swap="if (event.detail.requestConfig != null && event.detail.requestConfig.triggeringEvent.detail.value != null) {htmx.swap(this, event.detail.requestConfig.triggeringEvent.detail.value.replaceAll('Ã©', 'é').replaceAll('Ã¨', 'è'), {swapStyle: 'innerHTML'})}">
      {{ .Menu }}
    </div>

    <!-- Notification box -->
    <div id="notificationBox" hx-trigger="notificationEvent from:body" hx-disinherit="*" hx-get="data:text/html,"
      hx-swap="none"
      hx-on:htmx:after-swap="if (event.detail.requestConfig != null) {htmx.swap(this, event.detail.requestConfig.triggeringEvent.detail.value.replaceAll('Ã©', 'é').replaceAll('Ã¨', 'è'), {swapStyle: 'afterbegin'})}">
    </div>

    <!-- Main page content -->
    <section class="section">
      <div id="page-body">
        {{ .Content }}
      </div>
    </section>

  </div>
</body>
